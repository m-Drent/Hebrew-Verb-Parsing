<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Biblical Hebrew Verb Parser </title>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SBL Hebrew', sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 800px; text-align: center; }
        
        .hebrew-word { font-size: 5rem; margin-bottom: 30px; direction: rtl; color: #2c3e50; min-height: 120px; }
        
        /* Grid Layout */
        .parsing-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .column-label { font-size: 0.75rem; font-weight: bold; color: #95a5a6; text-transform: uppercase; margin-bottom: 8px; }
        
        /* Button Styles */
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .choice-btn { 
            padding: 8px 4px; border: 2px solid #edeff2; border-radius: 6px; 
            background: white; cursor: pointer; font-size: 0.9rem; transition: 0.2s;
        }
        .choice-btn:hover { background: #f0f7ff; border-color: #d0e7ff; }
        .choice-btn.selected { background: #3498db; color: white; border-color: #2980b9; }

        /* Action Buttons */
        .controls { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-check { background: #27ae60; color: white; border: none; padding: 15px 40px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; }
        .btn-next { background: #ecf0f1; color: #34495e; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        
        #feedback { margin: 15px 0; font-size: 1.2rem; font-weight: bold; min-height: 1.5em; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="hebrew-display" class="hebrew-word">---</div>
    
    <div id="feedback"></div>

    <div class="parsing-grid">
        <div class="btn-group" data-category="stem">
            <div class="column-label">Stem</div>
            <button class="choice-btn" onclick="select(this, 'Qal')">Qal</button>
            <button class="choice-btn" onclick="select(this, 'Niphal')">Niphal</button>
            <button class="choice-btn" onclick="select(this, 'Piel')">Piel</button>
            <button class="choice-btn" onclick="select(this, 'Hiphil')">Hiphil</button>
            <button class="choice-btn" onclick="select(this, 'Hitpael')">Hitpael</button>
        </div>

        <div class="btn-group" data-category="tense">
            <div class="column-label">Tense</div>
            <button class="choice-btn" onclick="select(this, 'Qatal')">Perfect</button>
            <button class="choice-btn" onclick="select(this, 'Yiqtol')">Imperfect</button>
            <button class="choice-btn" onclick="select(this, 'Participle')">Ptc.</button>
            <button class="choice-btn" onclick="select(this, 'Imperative')">Impv.</button>
            <button class="choice-btn" onclick="select(this, 'Infinitive')">Inf.</button>
        </div>

        <div class="btn-group" data-category="p">
            <div class="column-label">Person</div>
            <button class="choice-btn" onclick="select(this, '1')">1st</button>
            <button class="choice-btn" onclick="select(this, '2')">2nd</button>
            <button class="choice-btn" onclick="select(this, '3')">3rd</button>
            <button class="choice-btn" onclick="select(this, 'N/A')">N/A</button>
        </div>

        <div class="btn-group" data-category="g">
            <div class="column-label">Gender</div>
            <button class="choice-btn" onclick="select(this, 'm')">Masc.</button>
            <button class="choice-btn" onclick="select(this, 'f')">Fem.</button>
            <button class="choice-btn" onclick="select(this, 'c')">Comm.</button>
            <button class="choice-btn" onclick="select(this, 'N/A')">N/A</button>
        </div>

        <div class="btn-group" data-category="n">
            <div class="column-label">Number</div>
            <button class="choice-btn" onclick="select(this, 's')">Sing.</button>
            <button class="choice-btn" onclick="select(this, 'p')">Plural</button>
            <button class="choice-btn" onclick="select(this, 'd')">Dual</button>
            <button class="choice-btn" onclick="select(this, 'N/A')">N/A</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn-check" onclick="checkParsing()">Check Answer</button>
        <button class="btn-next" onclick="loadNext()">Next Verb</button>
    </div>
</div>

<script>
    const verbs = [
        { text: "שָׁמַרְתִּי", stem: "Qal", tense: "Qatal", p: "1", g: "c", n: "s" },
        { text: "יְדַבְּרוּ", stem: "Piel", tense: "Yiqtol", p: "3", g: "m", n: "p" },
        { text: "תִּכְתֹּבְנָה", stem: "Qal", tense: "Yiqtol", p: "3", g: "f", n: "p" }
    ];

    let currentVerb = null;
    let userSelection = { stem: "", tense: "", p: "", g: "", n: "" };

    function select(element, value) {
        // Find the group this button belongs to
        const group = element.parentElement;
        const category = group.getAttribute('data-category');

        // Remove 'selected' class from all buttons in this group
        group.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('selected'));
        
        // Select this one
        element.classList.add('selected');
        userSelection[category] = value;
    }

    function loadNext() {
        document.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('selected'));
        userSelection = { stem: "", tense: "", p: "", g: "", n: "" };
        document.getElementById('feedback').innerHTML = "";
        
        currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
        document.getElementById('hebrew-display').innerText = currentVerb.text;
    }

    function checkParsing() {
        const categories = ['stem', 'tense', 'p', 'g', 'n'];
        let correctCount = 0;

        categories.forEach(cat => {
            if (userSelection[cat] === currentVerb[cat]) correctCount++;
        });

        const feedback = document.getElementById('feedback');
        if (correctCount === 5) {
            feedback.innerHTML = "<span class='success'>Perfect! 🌟</span>";
        } else {
            feedback.innerHTML = `<span class='error'>You got ${correctCount}/5 correct.</span>`;
        }
    }

    loadNext();
</script>

</body>
</html>
